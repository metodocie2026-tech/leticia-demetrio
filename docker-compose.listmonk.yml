# Stack de desenvolvimento local pra testar a migração Brevo → Listmonk/SES
# (docs/migracao-brevo-ses.md) sem depender do Amazon SES.
#
# O Mailhog substitui o SES localmente: qualquer e-mail que o Listmonk mandar
# é "entregue" nele, visível na UI em http://localhost:8025, sem sair da
# máquina e sem precisar de nenhuma credencial AWS. Depois que o SES estiver
# aprovado (docs/tutorial-amazon-ses.md), a produção usa o SMTP real do SES —
# esse arquivo é só pra teste local.
#
# Uso: docker compose -f docker-compose.listmonk.yml up -d
# Depois: http://localhost:9000 (Listmonk) e http://localhost:8025 (Mailhog)

x-db-credentials: &db-credentials
  POSTGRES_USER: &db-user listmonk
  POSTGRES_PASSWORD: &db-password listmonk
  POSTGRES_DB: &db-name listmonk

services:
  listmonk:
    image: listmonk/listmonk:latest
    container_name: leticia_listmonk
    restart: unless-stopped
    ports:
      - "9000:9000"
    networks:
      - leticia-listmonk
    depends_on:
      db:
        condition: service_healthy
    command: [sh, -c, "./listmonk --install --idempotent --yes --config '' && ./listmonk --upgrade --yes --config '' && ./listmonk --config ''"]
    environment:
      LISTMONK_app__address: 0.0.0.0:9000
      LISTMONK_db__user: *db-user
      LISTMONK_db__password: *db-password
      LISTMONK_db__database: *db-name
      LISTMONK_db__host: db
      LISTMONK_db__port: 5432
      LISTMONK_db__ssl_mode: disable
      TZ: America/Sao_Paulo
      LISTMONK_ADMIN_USER: ${LISTMONK_ADMIN_USER:-admin}
      LISTMONK_ADMIN_PASSWORD: ${LISTMONK_ADMIN_PASSWORD:-admin123456}

  db:
    image: postgres:17-alpine
    container_name: leticia_listmonk_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432" # 5433 pra não colidir com um Postgres local na porta padrão
    networks:
      - leticia-listmonk
    environment:
      <<: *db-credentials
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listmonk"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - leticia-listmonk-data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: leticia_mailhog
    restart: unless-stopped
    ports:
      - "8025:8025" # UI web — ver os e-mails "enviados"
      - "1025:1025" # SMTP — é isso que configuramos dentro do Listmonk
    networks:
      - leticia-listmonk

networks:
  leticia-listmonk:

volumes:
  leticia-listmonk-data:
